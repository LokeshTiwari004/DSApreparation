<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Prep Dashboard</title>
  <style>
    body {font-family: Arial, sans-serif; margin:0; padding:0; background:#f9f9f9;}
    header {background:#2c3e50; color:white; padding:1rem; text-align:center;}
    nav {background:#34495e; display:flex; justify-content:center; gap:2rem;}
    nav a {color:#ecf0f1; text-decoration:none; padding:0.5rem 1rem;}
    nav a:hover {background:#1abc9c;}
    main {padding:2rem; max-width:1200px; margin:auto;}
    table {width:100%; border-collapse:collapse; margin-top:1rem;}
    th, td {border:1px solid #ddd; padding:0.5rem; text-align:left;}
    th {background:#f2f2f2;}
    .loading {text-align:center; margin-top:2rem;}
    .diff-summary {display:flex; gap:1rem; margin-bottom:1rem; flex-wrap:wrap;}
    .diff-pill {padding:0.3rem 0.8rem; border-radius:12px; font-size:0.85rem; font-weight:bold; color:#fff;}
    .diff-pill.easy {background:#27ae60;}
    .diff-pill.medium {background:#f39c12;}
    .diff-pill.hard {background:#e74c3c;}
    .badge {display:inline-block; padding:0.15rem 0.5rem; border-radius:8px; font-size:0.75rem; font-weight:bold; color:#fff;}
    .badge.easy {background:#27ae60;}
    .badge.medium {background:#f39c12;}
    .badge.hard {background:#e74c3c;}
  </style>
</head>
<body>
  <header>
    <h1>DSA Preparation</h1>
    <p>Quick access to solved problems, logs and upcoming tasks.</p>
  </header>
  <nav>
    <a href="javascript:void(0)" onclick="showProblems()">Problems</a>
    <a href="javascript:void(0)" onclick="loadMarkdown('TODO.md')">Todo</a>
    <a href="javascript:void(0)" onclick="loadMarkdown('log.md')">Log</a>
    <a href="javascript:void(0)" onclick="loadMarkdown('ROADMAP.md')">Roadmap</a>
  </nav>
  <main>
    <section id="problems">
      <h2>Problem List</h2>
      <div class="diff-summary" id="diff-summary"></div>
      <div class="loading" id="loading">Loading problems...</div>
      <table id="problem-table" style="display:none;">
        <thead>
          <tr>
            <th>#</th>
            <th>Title</th>
            <th>Difficulty</th>
            <th>Language</th>
            <th>Solution</th>
          </tr>
        </thead>
        <tbody id="problem-body"></tbody>
      </table>
</section>
    <section id="doc" style="display:none;">
      <h2 id="doc-title"></h2>
      <div id="doc-body"></div>
    </section>
    <section id="details" style="display:none;">
      <h2 id="detail-title" style="display: none;"></h2>
      <a href="javascript:void(0)" onclick="showProblems()">Back to list</a>
      <div id="log-body"></div>
      <h2>CODE SOLUTION</h2>
      <div id="solution-wrapper"></div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    async function loadProblems() {
      try {
        const resp = await fetch('data/problems.json');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const problems = await resp.json();
      // Store globally for later lookup
      window.problemsData = problems;
      const tbody = document.getElementById('problem-body');
        const labels = ['easy', 'medium', 'hard'];
        const counts = [0, 0, 0];
        problems.forEach(p => {
          const d = p.difficulty !== undefined ? p.difficulty : 0;
          counts[d] = (counts[d] || 0) + 1;
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${p.id}</td>
            <td>${p.title}</td>
            <td><span class="badge ${labels[d]}">${labels[d].charAt(0).toUpperCase() + labels[d].slice(1)}</span></td>
            <td>${p.language}</td>
            <td><button onclick="showDetails(${p.id})">View</button></td>
          `;
          tbody.appendChild(tr);
        });
        // Render summary pills
        const summaryEl = document.getElementById('diff-summary');
        const diffNames = ['Easy', 'Medium', 'Hard'];
        summaryEl.innerHTML = diffNames.map((name, i) =>
          `<span class="diff-pill ${labels[i]}">${name}: ${counts[i]}</span>`
        ).join('') + `<span class="diff-pill" style="background:#7f8c8d;">Total: ${problems.length}</span>`;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('problem-table').style.display = 'table';
      } catch (e) {
        const msg = document.getElementById('loading');
        msg.textContent = 'Failed to load problems. Ensure the page is served over HTTP (e.g., "python -m http.server") or view it via GitHub Pages.';
        console.error(e);
      }
    }
    async function loadMarkdown(file) {
      try {
        const resp = await fetch(file);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const md = await resp.text();
        const html = marked.parse(md);
        document.getElementById('doc-title').textContent = file.replace('.md', '').toUpperCase();
        document.getElementById('doc-body').innerHTML = html;
        // hide problem list, details and show markdown doc
        document.getElementById('problems').style.display = 'none';
        document.getElementById('details').style.display = 'none';
        document.getElementById('doc').style.display = 'block';
      } catch (e) {
        console.error(e);
        alert('Failed to load documentation.');
      }
    }
    async function showDetails(id) {
      const p = window.problemsData.find(item => item.id === id);
      if (!p) return;
      // hide other sections
      document.getElementById('problems').style.display = 'none';
      document.getElementById('doc').style.display = 'none';
      document.getElementById('details').style.display = 'block';
      // set title
      document.getElementById('detail-title').textContent = `${p.id}. ${p.title}`;
        // Load solution source code (raw)
        try {
          const resp = await fetch(p.solution_raw_url);
          if (resp.ok) {
            const code = await resp.text();
            const wrapper = document.getElementById('solution-wrapper');
            // Escape HTML for safe rendering
            const escaped = code
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;');
            wrapper.innerHTML = `<pre><code class="language-${p.language=='py' ? 'python': p.language} line-numbers">${escaped}</code></pre>`;
          } else {
            document.getElementById('solution-wrapper').innerHTML = '<em>Solution not available.</em>';
          }
        } catch (e) {
          document.getElementById('solution-wrapper').innerHTML = '<em>Error loading solution.</em>';
        }
      // Load markdown log if exists
      const logContainer = document.getElementById('log-body');
      if (p.log_raw_url) {
        try {
          const respLog = await fetch(p.log_raw_url);
          if (respLog.ok) {
            const md = await respLog.text();
            logContainer.innerHTML = marked.parse(md);
          } else {
            logContainer.innerHTML = '<em>Log not available.</em>';
          }
        } catch (e) {
          logContainer.innerHTML = '<em>Error loading log.</em>';
        }
      } else {
        logContainer.innerHTML = '<em>No log file found.</em>';
      }
    }
    
    function showProblems() {
      // hide markdown doc and details, show problem list
      document.getElementById('doc').style.display = 'none';
      document.getElementById('details').style.display = 'none';
      document.getElementById('problems').style.display = 'block';
    }
    // Auto‑load when the script runs
    loadProblems();
  </script>
</body>
</html>
