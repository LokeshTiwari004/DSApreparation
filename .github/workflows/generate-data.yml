name: Generate DSA data
on:
  push:
    branches: [ main ]   # change if you use a different branch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Make script executable
        run: chmod +x run_data.sh
      - name: Generate problems.json
        run: ./run_data.sh
      - name: Commit updated data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/problems.json
          if ! git diff --cached --quiet; then
            git commit -m "CI: Update data/problems.json"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes to data/problems.json"
          fi
